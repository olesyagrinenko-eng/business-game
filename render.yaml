# Render Blueprint: один клик деплой из репозитория
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: business-game
    runtime: python
    buildCommand: pip install -r requirements.txt
    # Запуск через run.py: порт берётся из PORT в Python, чтобы Render точно увидел открытый порт
    startCommand: python run.py
