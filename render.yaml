# Render Blueprint: один клик деплой из репозитория
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: business-game
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    # Проверка по HTTP вместо сканирования порта — тогда Render не выключит сервис
    healthCheckPath: /health
