# Render Blueprint: один клик деплой из репозитория
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: business-game
    runtime: python
    buildCommand: pip install -r requirements.txt
    # Важно: слушать 0.0.0.0 и порт из $PORT, иначе Render не увидит открытый порт
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --timeout 120 app:app
