<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Деревья метрик — Бизнес-игра</title>
  <link rel="stylesheet" href="https://yastatic.net/s3/home/fonts/ys/4/text.css" crossorigin="anonymous">
  <style>
    :root { --bg: #ffffff; --card: #ffffff; --dark: #233967; --accent: #4DAAF8; --text: #233967; --muted: #233967; --border: #233967; }
    * { box-sizing: border-box; }
    body { font-family: 'YS Text', 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; min-height: 100vh; padding: 1.5rem; -webkit-font-smoothing: antialiased; }
    h1 { font-size: 1.75rem; margin: 0 0 1rem 0; color: var(--text); }
    p.lead { color: var(--muted); margin-bottom: 1.5rem; }
    .nav-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1rem; }
    .nav-grid a { display: block; background: var(--card); border: 2px solid var(--border); border-radius: 16px; padding: 1.25rem; text-align: center; text-decoration: none; color: var(--text); font-weight: 600; transition: border-color 0.2s, background 0.2s; }
    .nav-grid a:hover { border-color: var(--accent); background: rgba(77, 170, 248, 0.08); color: var(--dark); }
    .nav-grid .num { font-size: 2rem; font-weight: 800; color: var(--accent); display: block; margin-bottom: 0.25rem; }
    .imgs { display: flex; gap: 1rem; margin: 2rem 0; flex-wrap: wrap; justify-content: center; }
    .imgs img { width: 100px; height: 100px; object-fit: cover; border-radius: 50%; border: 3px solid var(--accent); }
    .imgs img.blob { border-radius: 40% 60% 70% 30% / 50% 50% 50% 50%; }
  </style>
</head>
<body>
  <h1>Деревья метрик</h1>
  <p class="lead">Выберите раунд. На странице раунда укажите решения команд (коэффициенты) — дерево автоматически обновит метрики и подсветку (зелёный / жёлтый / красный).</p>
  <div class="imgs">
    <img src="img/картинка 1.png" alt="" class="blob">
    <img src="img/картинка 2.png" alt="" class="blob">
    <img src="img/картинка 3.png" alt="" class="blob">
  </div>
  <nav class="nav-grid">
    <a href="round1.html"><span class="num">1</span> Раунд 1</a>
    <a href="round2.html"><span class="num">2</span> Раунд 2</a>
    <a href="round3.html"><span class="num">3</span> Раунд 3</a>
    <a href="round4.html"><span class="num">4</span> Раунд 4</a>
    <a href="round5.html"><span class="num">5</span> Раунд 5</a>
    <a href="round6.html"><span class="num">6</span> Раунд 6</a>
  </nav>
  <p style="margin-top:2rem; font-size:0.9rem; color: var(--muted);"><a href="../screen.html" style="color: var(--accent);">← Экран для проектора</a></p>
</body>
</html>
